version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: evidenceiq
      POSTGRES_PASSWORD: evidenceiq
      POSTGRES_DB: evidenceiq
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://evidenceiq:evidenceiq@postgres:5432/evidenceiq
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    environment:
      VITE_API_BASE: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:
